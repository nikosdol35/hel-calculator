name: Validation Tests

on:
  push:
    branches: [main]
  # Run CI on every pull request regardless of target branch. The
  # validation campaign ships as stacked PRs (Package 2 → Package 1,
  # Package 3 → Package 2, etc.) and each stage needs its own green
  # signal before the next merges forward.
  pull_request:

# A split pipeline (Package 2 Layer 2 CI upgrade per
# validation/README.md). Each job runs in parallel and reports
# independently so a lint failure doesn't mask a physics regression
# and vice versa. The physics / golden / UI jobs all share the same
# pip cache; hypothesis is a real runtime dep in the validation layer.
jobs:
  physics:
    name: Physics + cross-module + properties
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run SPEC validation + cross-module + properties
        # Exclude golden (separate job) and e2e (separate job — slow
        # Streamlit AppTest renders shouldn't gate the physics suite).
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_golden.py \
            -m "not e2e"

  e2e:
    name: End-to-end UI (Streamlit AppTest)
    runs-on: ubuntu-latest
    # The e2e tests render the full Streamlit script via AppTest —
    # ~60-120 s per test on the canonical scenario. They guard
    # against UI-flow regressions (envelope spinner, run-analysis
    # budget, auth gate) that the unit tests can't catch.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run end-to-end Streamlit AppTest suite
        run: pytest tests/ -v --tb=short -m e2e

  golden:
    name: Golden-output regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run golden regression
        # The golden baselines are seeded locally with
        # GOLDEN_UPDATE=1 then committed. In CI this job compares
        # the current orchestrator outputs against the committed JSON;
        # if the JSON is missing the tests SKIP (not FAIL) so the
        # bootstrap period stays green.
        run: pytest tests/test_golden.py -v --tb=short

  lint:
    name: Lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes mypy
      - name: Pyflakes (unused imports, undefined names)
        run: python -m pyflakes physics/ ui/ tests/
      - name: Mypy (permissive)
        # Permissive type gate per validation/README.md — surfaces
        # obvious type mistakes without blocking on every missing
        # annotation.
        run: python -m mypy --ignore-missing-imports physics/ ui/

name: Validation Tests

on:
  push:
    branches: [main]
  # Run CI on every pull request regardless of target branch. The
  # validation campaign ships as stacked PRs (Package 2 → Package 1,
  # Package 3 → Package 2, etc.) and each stage needs its own green
  # signal before the next merges forward.
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run validation suite
        run: pytest tests/ -v --tb=short
